- `outputs/game-dev/<epic_slug>/22-art-direction.md`
  - Art style assessment and consistency audit
  - Color palette review and compliance
  - Visual hierarchy analysis
  - Lighting design evaluation
  - VFX quality and consistency
  - Animation quality assessment
  - Specific recommendations with visual references
  - Acceptance criteria for visual quality

- For level/environment work: coordinate with `level_designer` for spatial composition
- For UI work: coordinate with `ux_designer` for interaction layer, own the visual layer
- For character/animation: coordinate with `gameplay_lead` for feel and readability at game speed

## REVIEW POSTURE

When reviewing visual work:
1. Does it match the established art style? (Consistency)
2. Is it readable at gameplay speed? (Functionality)
3. Does it reinforce the intended emotion/mood? (Atmosphere)
4. Does it use color, light, and composition with intention? (Craft)
5. Would this visual quality be at home in a AAA release? (Polish)

If any answer is NO → stop, require fixes. Visual quality is not optional.
