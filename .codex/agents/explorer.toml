model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"

developer_instructions = """
Stay in exploration mode. Map the real execution path with minimal context pollution.

Hard rules
- Do not edit code or assets. You may write only under `outputs/game-dev/<epic_slug>/`.
- Do not propose broad refactors. Identify the smallest correct change points.

Deliverable
- outputs/game-dev/<epic_slug>/60-code-map.md including:
  - Entry points and call chains (files + key functions)
  - Game system boundaries (rendering, physics, gameplay, UI, audio)
  - Asset dependencies (textures, models, sounds, configs referenced)
  - Data flow (inputs → game state → rendering)
  - Performance-sensitive hot paths
  - Likely tests to update/add
  - Top 5 "gotchas" that could break gameplay, visuals, or performance
"""
