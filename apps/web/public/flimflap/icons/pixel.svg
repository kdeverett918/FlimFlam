<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <pattern id="sl" width="64" height="4" patternUnits="userSpaceOnUse">
      <rect width="64" height="2" fill="rgba(255,255,255,0.08)"/>
      <rect y="2" width="64" height="2" fill="rgba(0,0,0,0.12)"/>
    </pattern>
  </defs>
  <g>
    <animate attributeName="opacity" values="1;1;0.85;1;1;0.9;1;1;1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <!-- Body pixels - color shifting -->
    <g fill="#00E5CC">
      <animate attributeName="fill" values="#00E5CC;#00E5CC;#00CC77;#00E5CC;#CC44FF;#00E5CC" dur="4s" repeatCount="indefinite"/>
      <rect x="24" y="20" width="12" height="4"/>
      <rect x="20" y="24" width="20" height="4"/>
      <rect x="16" y="28" width="28" height="4"/>
      <rect x="16" y="32" width="28" height="4"/>
      <rect x="20" y="36" width="20" height="4"/>
      <rect x="24" y="40" width="12" height="4"/>
    </g>
    <!-- Darker edge pixels -->
    <g fill="#009988">
      <animate attributeName="fill" values="#009988;#009988;#008855;#009988;#9933CC;#009988" dur="4s" repeatCount="indefinite"/>
      <rect x="20" y="24" width="4" height="4"/>
      <rect x="36" y="24" width="4" height="4"/>
      <rect x="16" y="28" width="4" height="4"/>
      <rect x="40" y="28" width="4" height="4"/>
      <rect x="40" y="32" width="4" height="4"/>
      <rect x="20" y="36" width="4" height="4"/>
      <rect x="36" y="36" width="4" height="4"/>
    </g>
    <!-- Eyes -->
    <rect x="24" y="28" width="4" height="4" fill="#111"/>
    <rect x="34" y="28" width="4" height="4" fill="#111"/>
    <!-- Beak -->
    <rect x="44" y="30" width="8" height="4" fill="#FF6644"/>
    <rect x="44" y="34" width="4" height="4" fill="#CC4422"/>
    <!-- Tail -->
    <rect x="8" y="28" width="8" height="4" fill="#00AA99"/>
    <rect x="8" y="32" width="8" height="4" fill="#009988"/>
    <!-- Feet -->
    <rect x="26" y="44" width="4" height="4" fill="#FF6644"/>
    <rect x="22" y="48" width="4" height="4" fill="#FF6644"/>
    <rect x="34" y="44" width="4" height="4" fill="#FF6644"/>
    <rect x="38" y="48" width="4" height="4" fill="#FF6644"/>
    <!-- Scanline overlay -->
    <rect width="64" height="64" fill="url(#sl)">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,4" dur="0.5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>