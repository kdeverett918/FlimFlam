<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Body (trembling) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0.5,-0.3;-0.4,0.5;0.3,-0.4;-0.5,0.3;0,0" dur="0.3s" repeatCount="indefinite"/>
    <!-- Main body -->
    <ellipse cx="32" cy="36" rx="17" ry="15" fill="#FF69B4"/>
    <ellipse cx="26" cy="31" rx="6" ry="5" fill="#FF8DC7" opacity="0.5"/>
    <!-- Messy feather tufts -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;1,-0.5;-0.8,0.6;0.6,-0.8;-1,0.4;0,0" dur="0.15s" repeatCount="indefinite"/>
      <path d="M28,22 L25,12 L29,19 Z" fill="#E0458A"/>
      <path d="M33,21 L35,10 L36,19 Z" fill="#FF69B4"/>
      <path d="M38,23 L43,14 L40,21 Z" fill="#E0458A"/>
      <path d="M24,24 L19,15 L25,21 Z" fill="#FF69B4"/>
      <path d="M31,22 L30,8 L33,18 Z" fill="#D63384"/>
    </g>
    <!-- Tail -->
    <polygon points="14,36 6,30 8,36 5,42 14,38" fill="#D63384"/>
    <!-- Wing -->
    <ellipse cx="21" cy="38" rx="7" ry="4" fill="#D63384" transform="rotate(-10 21 38)"/>
    <!-- Panicked eyes - left -->
    <ellipse cx="27" cy="31" rx="6" ry="7" fill="white" stroke="#333" stroke-width="0.5"/>
    <circle cx="27" cy="31" r="3.5" fill="#222">
      <animate attributeName="cx" values="27;25;29;27;26;28;27" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25.5" cy="29" r="1.2" fill="white">
      <animate attributeName="cx" values="25.5;24;27.5;25.5" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Panicked eyes - right -->
    <ellipse cx="38" cy="31" rx="6" ry="7" fill="white" stroke="#333" stroke-width="0.5"/>
    <circle cx="38" cy="31" r="3.5" fill="#222">
      <animate attributeName="cx" values="38;36;40;38;37;39;38" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="36.5" cy="29" r="1.2" fill="white">
      <animate attributeName="cx" values="36.5;35;38.5;36.5" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Tiny worried beak/mouth -->
    <ellipse cx="33" cy="40" rx="4" ry="2" fill="#E8451A"/>
    <path d="M30,40.5 Q33,43 36,40.5" fill="none" stroke="#222" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Worry lines above eyes -->
    <path d="M22,24 Q25,22 28,24" fill="none" stroke="#C0366B" stroke-width="0.8"/>
    <path d="M34,24 Q37,22 40,24" fill="none" stroke="#C0366B" stroke-width="0.8"/>
    <!-- Feet -->
    <line x1="27" y1="49" x2="24" y2="56" stroke="#E8451A" stroke-width="2" stroke-linecap="round"/>
    <line x1="36" y1="49" x2="39" y2="56" stroke="#E8451A" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>