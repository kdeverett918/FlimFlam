<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="ghostGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer ethereal glow -->
  <ellipse cx="32" cy="34" rx="22" ry="20" fill="#B0C4DE" opacity="0.15" filter="url(#ghostGlow)">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Main ghost body - drifts up and down -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0;0,1;0,0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.45;0.7;0.8;0.7" dur="4s" repeatCount="indefinite"/>
    <!-- Body top half - round -->
    <ellipse cx="32" cy="30" rx="16" ry="14" fill="#E8EEF4"/>
    <!-- Body highlight -->
    <ellipse cx="27" cy="26" rx="6" ry="4" fill="white" opacity="0.4"/>
    <!-- Wispy bottom edge -->
    <path d="M16,34 Q19,44 22,42 Q25,48 28,42 Q31,48 34,42 Q37,48 40,42 Q43,46 48,34 Z" fill="#E8EEF4">
      <animate attributeName="d" values="M16,34 Q19,44 22,42 Q25,48 28,42 Q31,48 34,42 Q37,48 40,42 Q43,46 48,34 Z;M16,34 Q18,46 22,43 Q24,49 28,43 Q32,49 34,43 Q38,49 40,43 Q44,47 48,34 Z;M16,34 Q19,44 22,42 Q25,48 28,42 Q31,48 34,42 Q37,48 40,42 Q43,46 48,34 Z" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Wispy tail strand -->
    <path d="M28,44 Q26,50 28,54" fill="none" stroke="#E8EEF4" stroke-width="2" stroke-linecap="round" opacity="0.5">
      <animate attributeName="d" values="M28,44 Q26,50 28,54;M28,44 Q24,51 27,55;M28,44 Q26,50 28,54" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M36,44 Q38,50 36,54" fill="none" stroke="#E8EEF4" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
      <animate attributeName="d" values="M36,44 Q38,50 36,54;M36,44 Q40,51 37,55;M36,44 Q38,50 36,54" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <!-- Hollow dark eyes -->
    <ellipse cx="26" cy="29" rx="4" ry="4.5" fill="#1a1a2e"/>
    <ellipse cx="38" cy="29" rx="4" ry="4.5" fill="#1a1a2e"/>
    <!-- Faint eye glow -->
    <ellipse cx="26" cy="29" rx="2" ry="2.2" fill="#4a5568" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="38" cy="29" rx="2" ry="2.2" fill="#4a5568" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite" begin="0.3s"/>
    </ellipse>
    <!-- Tiny "o" mouth -->
    <circle cx="32" cy="37" r="2" fill="#1a1a2e"/>
    <circle cx="32" cy="37" r="1.2" fill="#2d3748"/>
  </g>
</svg>