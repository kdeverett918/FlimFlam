<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Body - olive/army green round bird -->
  <circle cx="32" cy="36" r="22" fill="#5b6b3c"/>
  <!-- Belly -->
  <ellipse cx="32" cy="42" rx="14" ry="12" fill="#7a8c52"/>

  <!-- Salute tilt animation on body -->
  <animateTransform attributeName="transform" type="rotate" values="0 32 36;-3 32 36;0 32 36;0 32 36;0 32 36" dur="4s" repeatCount="indefinite" begin="1s"/>

  <!-- Army helmet -->
  <g>
    <ellipse cx="32" cy="20" rx="18" ry="10" fill="#3d4a2a"/>
    <ellipse cx="32" cy="22" rx="16" ry="7" fill="#4a5832"/>
    <rect x="16" y="20" width="32" height="4" rx="2" fill="#3d4a2a"/>
    <!-- Helmet strap -->
    <path d="M18 24 Q18 28 20 30" fill="none" stroke="#2a3318" stroke-width="1"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0;0,0" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Stern eyes -->
  <g>
    <!-- Left eye -->
    <ellipse cx="25" cy="32" rx="4" ry="3" fill="#fff"/>
    <circle cx="26" cy="32" r="2" fill="#1a1a0a"/>
    <circle cx="26.5" cy="31.5" r="0.6" fill="#fff"/>
    <!-- Right eye -->
    <ellipse cx="39" cy="32" rx="4" ry="3" fill="#fff"/>
    <circle cx="38" cy="32" r="2" fill="#1a1a0a"/>
    <circle cx="38.5" cy="31.5" r="0.6" fill="#fff"/>
    <!-- Angry brow lines -->
    <line x1="20" y1="28" x2="28" y2="29" stroke="#2a3318" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="44" y1="28" x2="36" y2="29" stroke="#2a3318" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- War paint stripes under eyes -->
  <g>
    <rect x="21" y="35" width="7" height="1.5" rx="0.5" fill="#1a1a0a" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.6;0.8" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="21" y="37.5" width="7" height="1.5" rx="0.5" fill="#1a1a0a" opacity="0.8">
      <animate attributeName="opacity" values="0.6;0.8;1;0.6" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <rect x="36" y="35" width="7" height="1.5" rx="0.5" fill="#1a1a0a" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.6;0.8" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="36" y="37.5" width="7" height="1.5" rx="0.5" fill="#1a1a0a" opacity="0.8">
      <animate attributeName="opacity" values="0.6;0.8;1;0.6" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
  </g>

  <!-- Beak - stern set jaw -->
  <path d="M28 42 L32 47 L36 42 Z" fill="#c8a03c"/>

  <!-- Wing (saluting side) -->
  <ellipse cx="53" cy="34" rx="5" ry="9" fill="#4a5832" transform="rotate(-10 53 34)"/>
</svg>