<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Squishy bounce + squish breathing -->
  <g transform="translate(32,36)">
    <animateTransform attributeName="transform" type="translate" values="32,36;32,34;32,36;32,37;32,36" dur="2s" repeatCount="indefinite"/>
    <!-- Round pastel pink body with squish -->
    <ellipse cx="0" cy="0" rx="17" ry="16" fill="#FFB6C1">
      <animate attributeName="rx" values="17;15.5;17;18;17" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="16;17.5;16;15;16" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Body highlight -->
    <ellipse cx="-5" cy="-6" rx="8" ry="6" fill="#FFD1DC" opacity="0.5"/>
    <!-- Blush marks - left -->
    <ellipse cx="-10" cy="3" rx="3.5" ry="2" fill="#FF8FAB" opacity="0.5">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Blush marks - right -->
    <ellipse cx="10" cy="3" rx="3.5" ry="2" fill="#FF8FAB" opacity="0.5">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.5s" repeatCount="indefinite" begin="0.3s"/>
    </ellipse>
    <!-- Tiny dot eyes -->
    <circle cx="-5" cy="-2" r="1.8" fill="#333"/>
    <circle cx="5" cy="-2" r="1.8" fill="#333"/>
    <!-- Eye shine -->
    <circle cx="-4.3" cy="-3" r="0.7" fill="white"/>
    <circle cx="5.7" cy="-3" r="0.7" fill="white"/>
    <!-- Cat-like content smile -->
    <path d="M-4,5 Q-2,3 0,5 Q2,3 4,5" fill="none" stroke="#333" stroke-width="1" stroke-linecap="round"/>
    <!-- Tiny wing nubs -->
    <ellipse cx="-15" cy="2" rx="4" ry="2.5" fill="#F8A4B8" transform="rotate(-15 -15 2)"/>
    <ellipse cx="15" cy="2" rx="4" ry="2.5" fill="#F8A4B8" transform="rotate(15 15 2)"/>
    <!-- Tiny feet -->
    <circle cx="-4" cy="15" r="2" fill="#F8A4B8"/>
    <circle cx="4" cy="15" r="2" fill="#F8A4B8"/>
  </g>
</svg>