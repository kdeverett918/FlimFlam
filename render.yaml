# Render Infrastructure — FLIMFLAM Frontend Services
# Colyseus game server lives on Colyseus Cloud (not here).
#
# Service URLs:
#   Web: https://flimflam.gg (custom domain → flimflam-web.onrender.com)
#
# NEXT_PUBLIC_* env vars are baked in at build time via apps/*/.env.production
# files committed to the repo — no manual env config needed in Render dashboard.

services:
  # ── Web (unified host + controller) ──────────────────────────────────────────
  - type: web
    name: flimflam-web
    runtime: node
    region: oregon
    plan: starter
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm turbo build --filter=@flimflam/web...
    startCommand: cd apps/web && npx next start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: FLIMFLAM_STRICT_ENV
        value: "1"
    buildFilter:
      paths:
        - apps/web/**
        - packages/ai/**
        - packages/shared/**
        - packages/ui/**
        - package.json
        - pnpm-lock.yaml
        - turbo.json
