# Render Infrastructure — FLIMFLAM Frontend Services
# Colyseus game server lives on Colyseus Cloud (not here).
#
# Service URLs (set by chosen service names):
#   Controller: https://flimflam-controller.onrender.com
#   Host:       https://flimflam-host.onrender.com
#
# NEXT_PUBLIC_* env vars are baked in at build time via apps/*/.env.production
# files committed to the repo — no manual env config needed in Render dashboard.

services:
  # ── Controller (phone PWA) — deploy first ──────────────────────────────────
  - type: web
    name: flimflam-controller
    runtime: node
    region: oregon
    plan: starter
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm turbo build --filter=@flimflam/controller...
    startCommand: cd apps/controller && npx next start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: FLIMFLAM_STRICT_ENV
        value: "1"
    buildFilter:
      paths:
        - apps/controller/**
        - packages/shared/**
        - packages/ui/**
        - package.json
        - pnpm-lock.yaml
        - turbo.json

  # ── Host (TV / shared screen) ───────────────────────────────────────────────
  - type: web
    name: flimflam-host
    runtime: node
    region: oregon
    plan: starter
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm turbo build --filter=@flimflam/host...
    startCommand: cd apps/host && npx next start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: FLIMFLAM_STRICT_ENV
        value: "1"
    buildFilter:
      paths:
        - apps/host/**
        - packages/shared/**
        - packages/ui/**
        - package.json
        - pnpm-lock.yaml
        - turbo.json
