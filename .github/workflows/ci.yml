name: 'ci'

on:
  pull_request:
  push:
    branches:
      - 'main'
  merge_group:

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}'
  cancel-in-progress: true

permissions:
  contents: 'read'

defaults:
  run:
    shell: 'bash'

env:
  PNPM_VERSION: '10.30.3'

jobs:
  lint:
    name: 'ci / lint'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8' # ratchet:actions/checkout@v6

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4
        with:
          node-version: '22.22.0'

      - name: 'Setup pnpm'
        run: |-
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: 'Install dependencies'
        run: 'pnpm install --frozen-lockfile'

      - name: 'Run lint'
        run: 'pnpm lint'

  typecheck:
    name: 'ci / typecheck'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8' # ratchet:actions/checkout@v6

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4
        with:
          node-version: '22.22.0'

      - name: 'Setup pnpm'
        run: |-
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: 'Install dependencies'
        run: 'pnpm install --frozen-lockfile'

      - name: 'Run typecheck'
        run: 'pnpm typecheck'

  test:
    name: 'ci / test'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8' # ratchet:actions/checkout@v6

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4
        with:
          node-version: '22.22.0'

      - name: 'Setup pnpm'
        run: |-
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: 'Install dependencies'
        run: 'pnpm install --frozen-lockfile'

      - name: 'Run tests'
        run: 'pnpm test'

  build:
    name: 'ci / build'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8' # ratchet:actions/checkout@v6

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4
        with:
          node-version: '22.22.0'

      - name: 'Setup pnpm'
        run: |-
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: 'Install dependencies'
        run: 'pnpm install --frozen-lockfile'

      - name: 'Run build'
        run: 'pnpm build:all'
