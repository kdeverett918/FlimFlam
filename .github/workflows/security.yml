name: 'security'

on:
  pull_request:
  push:
    branches:
      - 'main'
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}'
  cancel-in-progress: true

permissions:
  contents: 'read'

jobs:
  dependency-review:
    name: 'security / dependency-review'
    if: "${{ github.event_name == 'pull_request' }}"
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      pull-requests: 'read'
    steps:
      - name: 'Detect dependency graph availability'
        id: 'depgraph'
        env:
          GITHUB_TOKEN: '${{ github.token }}'
        run: |-
          status_code="$(curl -sS -o /tmp/sbom.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/dependency-graph/sbom")"

          if [[ "${status_code}" == '200' ]]; then
            echo 'enabled=true' >> "${GITHUB_OUTPUT}"
          else
            echo 'enabled=false' >> "${GITHUB_OUTPUT}"
            echo "::notice::Dependency Graph unavailable (HTTP ${status_code}); dependency diff scan skipped."
          fi

      - name: 'Dependency review'
        if: "${{ steps.depgraph.outputs.enabled == 'true' }}"
        uses: 'actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803' # ratchet:actions/dependency-review-action@v4.8.3
        with:
          fail-on-severity: 'high'

  codeql:
    name: 'security / codeql'
    runs-on: 'ubuntu-latest'
    permissions:
      actions: 'read'
      contents: 'read'
      security-events: 'write'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8' # ratchet:actions/checkout@v6

      - name: 'Initialize CodeQL'
        uses: 'github/codeql-action/init@c4a7bc332abaec03596ff2803dd7f3ca3a238975' # ratchet:github/codeql-action@v3
        with:
          languages: 'javascript-typescript'

      - name: 'Analyze'
        uses: 'github/codeql-action/analyze@c4a7bc332abaec03596ff2803dd7f3ca3a238975' # ratchet:github/codeql-action@v3
        with:
          category: '/language:javascript-typescript'
