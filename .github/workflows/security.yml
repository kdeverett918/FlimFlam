name: 'security'

on:
  pull_request:
  push:
    branches:
      - 'main'
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}'
  cancel-in-progress: true

permissions:
  contents: 'read'

jobs:
  dependency-review:
    name: 'security / dependency-review'
    if: "${{ github.event_name == 'pull_request' }}"
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      pull-requests: 'read'
    steps:
      - name: 'Dependency review'
        uses: 'actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803' # ratchet:actions/dependency-review-action@v4.8.3
        with:
          fail-on-severity: 'high'

  codeql:
    name: 'security / codeql'
    runs-on: 'ubuntu-latest'
    permissions:
      actions: 'read'
      contents: 'read'
      security-events: 'write'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8' # ratchet:actions/checkout@v6

      - name: 'Initialize CodeQL'
        uses: 'github/codeql-action/init@c4a7bc332abaec03596ff2803dd7f3ca3a238975' # ratchet:github/codeql-action@v3
        with:
          languages: 'javascript-typescript'

      - name: 'Analyze'
        uses: 'github/codeql-action/analyze@c4a7bc332abaec03596ff2803dd7f3ca3a238975' # ratchet:github/codeql-action@v3
        with:
          category: '/language:javascript-typescript'
